tasks:
  - id: cross-provider-dedup
    fixture: .ai/evals/fixtures/cross-provider-dedup/
    command: make eval-cross-provider-dedup
    expected:
      invoice_count: 1
      duplicate_count: 1
    forbidden:
      - credential_content_in_logs
      - modification_outside_temp_dir
    threshold: pass

legacy_review_templates:
  - id: docs-usage-report-example
    name: Update report-generation examples in docs
    mode: prototype
    reasoning_level: ai:light
    scope: docs/how-to alignment for invoice report CLI examples and output paths
    source_of_truth:
      - README.md
      - docs/USAGE.md
      - Makefile
    rubric:
      - examples match current command behavior
      - product-code scope stays unchanged
      - docs preserve quick-start vs detailed-usage split
    ship_gate: docs-only alignment with no invented behavior
    required_validation:
      - Confirm command examples match current `make run-report` behavior.
      - Confirm no product code files changed.
    success_criteria:
      - Docs examples use real current flags and output files.
      - Orientation stays split between quick start and detailed usage.

  - id: readme-governance-discovery
    name: Add minimal discoverability links for repo governance files
    mode: prototype
    reasoning_level: ai:light
    scope: README documentation map alignment for repo-level working guidance
    source_of_truth:
      - README.md
      - AGENTS.md
      - PLANS.md
      - .ai/README.md
    rubric:
      - governance links resolve to real repo paths
      - README stays discoverability-focused
      - no unsupported workflow policy is introduced
    ship_gate: discoverability-only changes with no new process claims
    required_validation:
      - Confirm all linked governance paths exist.
      - Confirm README changes stay discoverability-only.
    success_criteria:
      - Contributors can find governance files from README.
      - No workflow policy is added beyond what repo files support.

  - id: cli-monthly-runbook-check
    name: Review monthly orchestration runbook consistency
    mode: production
    reasoning_level: ai:standard
    scope: docs and workflow consistency across monthly CLI examples, token-cache guidance, and local scheduler notes
    source_of_truth:
      - docs/USAGE.md
      - README.md
      - Makefile
    rubric:
      - command examples match current Makefile variables
      - auth/bootstrap guidance stays internally consistent
      - scheduler notes do not promise unsupported behavior
    ship_gate: documented monthly workflow must be runnable from current repo surfaces
    required_validation:
      - Compare `run-monthly` examples against current Makefile variables.
      - Verify scheduler notes do not conflict with documented auth flow.
    success_criteria:
      - Monthly runbook is internally consistent.
      - Graph bootstrap and unattended-token guidance stay accurate.

  - id: report-validation-surface-review
    name: Validate report-generation workflow documentation against current outputs
    mode: production
    reasoning_level: ai:standard
    scope: docs and validation coverage for JSON, CSV, summary CSV, and PDF report outputs
    source_of_truth:
      - README.md
      - docs/USAGE.md
      - tests/test_invoices_report.py
      - tests/test_invoices_report_utils.py
    rubric:
      - outputs and flags match implemented report behavior
      - validation commands map to real report surfaces
      - no future/planned behavior is presented as implemented
    ship_gate: report docs must describe only current outputs and flags
    required_validation:
      - Check output names and flags against tests and CLI docs.
      - Run targeted tests if behavior documentation changes materially.
    success_criteria:
      - Report docs describe only implemented outputs.
      - Validation commands clearly map to report behavior.

  - id: local-stack-docs-fit
    name: Align local stack documentation with current dev commands
    mode: production
    reasoning_level: ai:standard
    scope: local Docker Compose, n8n, api-go, and workers-py onboarding guidance
    source_of_truth:
      - README.md
      - docs/USAGE.md
      - Makefile
      - deploy/compose/docker-compose.dev.yml
    rubric:
      - documented services match current stack files
      - commands remain runnable as written
      - future API scope stays clearly separated from current behavior
    ship_gate: local-stack docs cannot claim unsupported services or endpoints
    required_validation:
      - Confirm documented `make dev`, `make up`, `make run-n8n`, and API references match current stack files.
      - Confirm no unsupported services are described as implemented.
    success_criteria:
      - Local stack docs match current commands and services.
      - Current vs future API scope remains explicit.

  - id: auth-token-flow-review
    name: Review Gmail and Graph token-handling guidance
    mode: production
    reasoning_level: ai:deep
    scope: auth/bootstrap/runbook review across Gmail OAuth files, Graph interactive auth, cache reuse, and unattended exits
    source_of_truth:
      - docs/USAGE.md
      - README.md
      - Makefile
      - apps/workers-py/src/invplatform/cli/graph_invoice_finder.py
      - tests/test_graph_invoice_auth.py
    rubric:
      - Graph auth flags and cache behavior match code and tests
      - Gmail credential guidance reflects implemented expectations
      - bootstrap and unattended flows are clearly separated
    ship_gate: auth docs must not invent token behavior or recovery flows
    required_validation:
      - Verify documented Graph auth flags and cache behavior against code and tests.
      - Verify Gmail credential-file guidance matches implemented expectations.
    success_criteria:
      - Auth docs are accurate and avoid invented behavior.
      - Unattended and bootstrap flows are clearly distinguished.

  - id: command-surface-governance-pass
    name: Audit repo command surfaces and source-of-truth order
    mode: production
    reasoning_level: ai:deep
    scope: governance review of which docs and commands should be treated as authoritative for day-to-day work
    source_of_truth:
      - AGENTS.md
      - README.md
      - docs/USAGE.md
      - Makefile
      - pytest.ini
      - requirements.txt
    rubric:
      - source-of-truth order matches actual repo usage
      - validation guidance references real commands only
      - stable rules and current-state notes remain clearly separated
    ship_gate: governance guidance must stay minimal, accurate, and repo-backed
    required_validation:
      - Confirm source-of-truth order matches actual repo usage.
      - Confirm validation guidance references real commands only.
    success_criteria:
      - Repo-owned guidance is minimal, accurate, and practical.
      - Stable rules and project-state tracking stay clearly separated.

  - id: lean-ctx-governance-review
    name: Review lean-ctx routing guidance and fallback rules
    mode: production
    reasoning_level: ai:review
    scope: docs-and-contract review of lean-ctx-first workflow expectations for substantial repo tasks
    source_of_truth:
      - AGENTS.md
      - .ai/README.md
      - .ai/task-packet-template.md
      - .ai/evals/tasks.yaml
      - tests/test_repo_verify_contract.py
    rubric:
      - "`ctx_overview`, `ctx_tree`, `ctx_search`, `ctx_read`, and compressed shell routing remain documented"
      - "fallback guidance stays explicit without weakening normal `ctx_*` usage"
      - contract coverage remains telemetry-free and discoverable
    ship_gate: lean-ctx-first policy must remain explicit in docs and contract tests
    required_validation:
      - "Check that `ctx_overview`, `ctx_tree`, `ctx_search`, `ctx_read`, and compressed shell routing remain documented in the repo guidance."
      - "Check that fallback guidance covers raw/native access and upstream dashboard failures without weakening normal lean-ctx usage."
    success_criteria:
      - Repo guidance keeps lean-ctx-first workflow explicit and discoverable.
      - Contract coverage protects the policy without introducing telemetry or CI enforcement of real command history.

  - id: pull-request-workflow-review
    name: Review a docs-and-workflow pull request for accuracy and risk
    mode: production
    reasoning_level: ai:review
    scope: code review focused on docs regressions, broken commands, missing validation, and invented governance policy
    source_of_truth:
      - README.md
      - docs/USAGE.md
      - AGENTS.md
      - PLANS.md
      - Makefile
    rubric:
      - findings prioritize real regressions over polish
      - cited commands and policies are supported by repo files
      - review output separates blocking issues from optional cleanup
    ship_gate: no merge-ready review without checking docs claims against repo truth
    required_validation:
      - Inspect changed files and cited commands.
      - Flag any policy or behavior claims not supported by repo files.
    success_criteria:
      - Findings prioritize real regressions and unsupported claims.
      - Review output separates findings from optional polish.

  - id: workflow-change-review
    name: Review a CLI workflow change touching docs, commands, and tests
    mode: production
    reasoning_level: ai:review
    scope: review of command-surface changes affecting contributor workflows or report-validation paths
    source_of_truth:
      - Makefile
      - docs/USAGE.md
      - pytest.ini
      - tests/
    rubric:
      - command examples still line up with implementation
      - validation guidance stays current
      - tests cover the changed workflow surface or the gap is called out
    ship_gate: workflow changes must keep docs, commands, and tests aligned
    required_validation:
      - Check that command examples and validation still line up after the diff.
      - Check for missing or outdated test guidance.
    success_criteria:
      - Review catches workflow regressions before merge.
      - Validation expectations remain explicit and runnable.

  - id: agentic-alignment-governance-review
    name: Review repo-level agentic-governance alignment for drift and missing gates
    mode: production
    reasoning_level: ai:review
    scope: governance review of agentic-engineering artifacts across repo rules, task packets, eval templates, and repo contract tests
    source_of_truth:
      - AGENTS.md
      - PLANS.md
      - .ai/README.md
      - .ai/task-packet-template.md
      - .ai/evals/tasks.yaml
      - tests/test_repo_verify_contract.py
    rubric:
      - substantial-work rules require task packets and working mode declarations
      - review templates define explicit rubrics and ship gates
      - docs, templates, and tests do not drift or make unsupported policy claims
    ship_gate: shared governance changes must preserve review gates and repo-backed policy claims
    required_validation:
      - Check that agentic-governance docs and templates agree on prototype vs production expectations.
      - Check that repo contract tests protect the documented governance fields.
      - Flag unsupported policy claims, missing review gates, or doc/test drift.
    success_criteria:
      - Governance artifacts behave like maintained repo assets rather than loose notes.
      - Review output highlights policy drift before shared workflow changes ship.

p1_after_first_hardening_pr:
  - Add property-based tests for deduplication, date intervals, and monetary calculations.
  - Validate the OpenAPI draft against actual implementation boundaries.
  - Add dependency and static-security checks.
  - Add structured run summaries containing provider status, duration, counts, failures, and redacted diagnostics.
  - Add failure injection for unavailable providers, malformed PDFs, and interrupted writes.
